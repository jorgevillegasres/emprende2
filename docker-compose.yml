services:
  postgres:
    image: postgres:16-alpine
    container_name: emprendedos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: emprendedos
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - emprendedos-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d emprendedos"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  emprendedos-postgres-data:
