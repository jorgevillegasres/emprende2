services:
  - type: web
    name: emprendedos-api
    env: node
    buildCommand: corepack pnpm install --frozen-lockfile && corepack pnpm --filter @emprendedos/api build
    startCommand: corepack pnpm --filter @emprendedos/api start
    healthCheckPath: /v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_STORE
        value: postgres
      - key: API_HOST
        value: 0.0.0.0
      - key: API_PORT
        value: "3001"
      - key: ALLOW_DEV_REQUEST_CONTEXT
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: emprendedos-db
          property: connectionString
      - key: WEB_ORIGIN
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: DEMO_AUTH_EMAIL
        sync: false
      - key: DEMO_AUTH_PASSWORD
        sync: false

databases:
  - name: emprendedos-db
    databaseName: emprendedos
    plan: free
